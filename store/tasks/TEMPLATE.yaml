  questions: []
  decisions: []

work_items:
  - id: WI-1
    owner: ""
    objective: ""        # one testable sentence
    strategy: BALANCE 1.0x   # per-item budget (FAST | BALANCE ×)
    consumes: []
    produces: ""
    owns_paths: []
    skills: []
    scripts: []
    blocked_by: []
    acceptance: []
    security_review: none

dag:
  parallel: []
  critical_path: []

exit_gate:
  owner: ""
  proof: ""

feedback:                # filled post-execution — anneal consumes
  outcome: null          # accepted | revised | rejected
  lesson: null
